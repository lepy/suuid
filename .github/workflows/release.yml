name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens/secrets.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Project: suuid  |  Owner: lepy  |  Repo: suuid
#   Workflow: release.yml  |  Environment: pypi
# Trigger by publishing a GitHub Release whose tag matches the version
# (e.g. tag `v0.1.0` for version 0.1.0).

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
